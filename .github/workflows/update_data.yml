name: Run 4D Scraper Selenium

on:
  workflow_dispatch: # Tombol manual "Run workflow" tetap ada

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo content
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/set-up-python@v4
      with:
        python-version: '3.9'

    - name: Install Chrome and Driver
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        # ChromeDriver otomatis menyesuaikan dengan versi Chrome terbaru di Ubuntu

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 selenium webdriver-manager

    - name: Run scraper
      run: python scraper.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.txt
        git commit -m "Update data keluaran 4D" || echo "No changes to commit"
        git push
