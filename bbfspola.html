<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>BBFS Pro v3 - Filter Blok Manual</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f0f2f5; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .filter-block { background: #f9f9f9; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .input-box { display: flex; flex-direction: column; width: 100px; }
        .input-box label { font-size: 12px; font-weight: bold; margin-bottom: 3px; }
        .result-container { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 6px; font-family: 'Courier New', monospace; word-wrap: break-word; margin-top: 10px; }
        button { padding: 10px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>BBFS Pro v3 - Filter Blok Manual</h2>
    
    <label>Input Angka BBFS:</label>
    <input type="text" id="inputAngka" style="width:100%; padding:10px; box-sizing:border-box;" placeholder="0123456789" maxlength="10">

    <div style="margin: 20px 0; padding: 15px; background: #fff9e6; border-radius: 8px;">
        <label><input type="checkbox" id="useFilter" checked> Eliminasi 4D yang pernah keluar (Lurus)</label>
    </div>

    <div id="filterArea">
        <label>Filter Manual (Blok Angka Mati):</label>
        </div>
    <button onclick="tambahBlokFilter()" style="background:#007bff; color:white; margin-top:10px;">+ Tambah Blok Filter Manual</button>

    <button onclick="prosesMain()" style="width:100%; background:#28a745; color:white; font-size:18px; margin-top:20px;">GENERATE & FILTER</button>

    <div id="hasilArea"></div>
</div>

<script>
function tambahBlokFilter() {
    const div = document.createElement('div');
    div.className = 'filter-block';
    div.innerHTML = `
        <button onclick="this.parentElement.remove()" style="position:absolute; right:5px; top:5px; background:red; color:white; padding:2px 8px;">X</button>
        <div class="input-group">
            <div class="input-box"><label>AS</label><input type="text" class="mAS" placeholder="ex: 12"></div>
            <div class="input-box"><label>KOP</label><input type="text" class="mKOP" placeholder="ex: 34"></div>
            <div class="input-box"><label>KEPALA</label><input type="text" class="mKEP" placeholder="ex: 56"></div>
            <div class="input-box"><label>EKOR</label><input type="text" class="mEKO" placeholder="ex: 78"></div>
        </div>
    `;
    document.getElementById('filterArea').appendChild(div);
}

async function prosesMain() {
    const inputStr = document.getElementById('inputAngka').value;
    const digits = [...new Set(inputStr.split(''))];
    let historySet = new Set();

    if (document.getElementById('useFilter').checked) {
        try {
            const res = await fetch("data_keluaran_magnum.txt");
            const text = await res.text();
            historySet = new Set(text.match(/\d{4}/g) || []);
        } catch(e) {}
    }

    // Ambil semua blok filter
    const blocks = [];
    document.querySelectorAll('.filter-block').forEach(b => {
        blocks.push({
            as: b.querySelector('.mAS').value.split(''),
            kop: b.querySelector('.mKOP').value.split(''),
            kep: b.querySelector('.mKEP').value.split(''),
            eko: b.querySelector('.mEKO').value.split('')
        });
    });

    let resMurni = [], resTwin = [], resTriple = [], resQuad = [];

    for (let a of digits) {
        for (let b of digits) {
            for (let c of digits) {
                for (let d of digits) {
                    let k = a + b + c + d;
                    if (historySet.has(k)) continue;

                    // Filter Manual (Setiap blok adalah kondisi "Dibuang")
                    let skip = false;
                    for (let f of blocks) {
                        if (f.as.includes(a) || f.kop.includes(b) || f.kep.includes(c) || f.eko.includes(d)) {
                            skip = true; break;
                        }
                    }
                    if (skip) continue;

                    // Klasifikasi
                    let u = new Set([a,b,c,d]).size;
                    if (u === 4) resMurni.push(k);
                    else if (u === 1) resQuad.push(k);
                    else if (u === 2) {
                        // Tambahkan logika isTriple di sini
                        if (isT(a,b,c,d)) resTriple.push(k); else resTwin.push(k);
                    } else if (u === 3) resTwin.push(k);
                }
            }
        }
    }
    
    document.getElementById('hasilArea').innerHTML = `
        <div class="result-container">MURNI (${resMurni.length}): ${resMurni.join('*')}</div>
        <div class="result-container">TWIN (${resTwin.length}): ${resTwin.join('*')}</div>
        <div class="result-container">TRIPLE (${resTriple.length}): ${resTriple.join('*')}</div>
        <div class="result-container">QUAD (${resQuad.length}): ${resQuad.join('*')}</div>
    `;
}

function isT(a,b,c,d) {
    let m = {}; [a,b,c,d].forEach(x => m[x] = (m[x]||0)+1);
    return Object.values(m).includes(3);
}
</script>
</body>
</html>
