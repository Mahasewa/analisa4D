<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sapu Jagat BBFS</title>
    <link rel="stylesheet" href="bbfs.css">
</head>
<body>
    <div class="bbfs-container">
        <h2>BBFS SAPU JAGAT</h2>
        <input type="text" id="inputBBFS" placeholder="Input Digit (max 10)" maxlength="10">
        <div id="filterContainer">
            <div class="filter-row">
                <input type="text" class="f-as" name="as" maxlength="1" placeholder="As">
                <input type="text" class="f-kop" name="kop" maxlength="1" placeholder="Kop">
                <input type="text" class="f-kep" name="kep" maxlength="1" placeholder="Kep">
                <input type="text" class="f-ekor" name="ekor" maxlength="1" placeholder="Ekor">
            </div>
        </div>
        <button onclick="tambahBarisFilter()">+ Baris Filter</button>
        <button onclick="jalankanProses()" style="background:#27ae60; color:white;">GENERATE</button>

        <div id="polaContainer" style="margin: 20px 0;"></div>
        <button onclick="gabungkanPola()">Gabungkan Pola</button>
        <div id="outputHasil" style="margin-top:20px;"></div>
    </div>
    <script src="mesin.js"></script>
    <script src="ui.js"></script>
</body>
</html>
