<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sapu Jagat Dashboard</title>
    <style>

	<link rel="stylesheet" href="style.css">
    </style>
</head>
<body>

	<nav class="menu-bar">
   	 <button onclick="pilihPasaran('home')">HOME</button>
   	 <button onclick="pilihPasaran('mag')">MAGNUM 4D</button>
   	 <button onclick="pilihPasaran('kud')">DAMACAI 1+3D</button>
   	 <button onclick="pilihPasaran('tot')">SPORTS TOTO</button>
	</nav>

	<div id="kontenData" class="result-grid">Memuat data...</div>

	<div class="nav-btns">
   	 <button onclick="ubahHalaman(-1)">Previous</button>
  	  <span id="infoHal">Halaman 1</span>
  	  <button onclick="ubahHalaman(1)">Next</button>
	</div>
<script src="script.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", muatData);
</script>
<script>
	function render() {
		const kontainer = document.getElementById('kontenData');
		let filtered = (pasaranAktif === 'home') ? dataGlobal : dataGlobal.filter(d => d.pasaran === pasaranAktif);
		let start = halAktif * 6;
		let dataTampil = filtered.slice(start, start + 6);
		
		kontainer.innerHTML = ""; 
		
		if (dataTampil.length === 0) {
			kontainer.innerHTML = "Data tidak ditemukan.";
			return;
		}

		dataTampil.forEach(d => {
			console.log("Sedang merender kartu untuk:", d.pasaran); // Tes apakah ini muncul di console?
			kontainer.innerHTML += `
				<div class="card">
					<div class="card-header">${d.pasaran.toUpperCase()} - ${d.tgl}</div>
					<div class="main-prizes" style="padding: 10px; text-align: center;">
						<div>1st: <b>${d.p1}</b></div>
						<div>2nd: <b>${d.p2}</b></div>
						<div>3rd: <b>${d.p3}</b></div>
					</div>
					<div style="font-size: 12px; padding: 10px;">
						Spec: ${d.spec}<br>
						Cons: ${d.cons}
					</div>
				</div>`;
		});
		document.getElementById('infoHal').innerText = "Halaman " + (halAktif + 1);
	}

	function renderSpan(teks) {
		if (!teks || teks === "-") return "";
		return teks.split(', ').map(n => `<span>${n}</span>`).join('');
	}

	function pilihPasaran(p) { 
		pasaranAktif = p;
		halAktif = 0; 
		render(); 
	}

	function ubahHalaman(dir) { 
		halAktif = Math.max(0, halAktif + dir);
		render(); 
	}

</script>
</body>
</html>
