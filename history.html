<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sapu Jagat Dashboard</title>
    <style>

	<link rel="stylesheet" href="style.css">
    </style>
</head>
<body>

	<nav class="menu-bar">
   	 <button onclick="pilihPasaran('home')">HOME</button>
   	 <button onclick="pilihPasaran('mag')">MAGNUM 4D</button>
   	 <button onclick="pilihPasaran('kud')">DAMACAI 1+3D</button>
   	 <button onclick="pilihPasaran('tot')">SPORTS TOTO</button>
	</nav>

	<div id="kontenData" class="result-grid">Memuat data...</div>

	<div class="nav-btns">
   	 <button onclick="ubahHalaman(-1)">Previous</button>
  	  <span id="infoHal">Halaman 1</span>
  	  <button onclick="ubahHalaman(1)">Next</button>
	</div>
<script src="script.js"></script>
<script>
    // Pemicu saat halaman pertama kali dibuka
    document.addEventListener("DOMContentLoaded", async () => {
        // 1. Muat data dulu dari GitHub
        await muatData(); 
        
        // 2. Setelah data ada, paksa render halaman 'home'
        pasaranAktif = 'home';
        render(); 
    });

    // Fungsi Render di history.html
    function render() {
        const kontainer = document.getElementById('kontenData');
        // Logika filter (pastikan 'home' menampilkan semua data)
        let filtered = (pasaranAktif === 'home') ? dataGlobal : dataGlobal.filter(d => d.pasaran === pasaranAktif);
        
        // ... (sisanya isi logika filter/pagination Koh) ...
        
        // Contoh sederhana untuk tes:
        kontainer.innerHTML = filtered.map(d => `<div class="card">${d.pasaran} - ${d.p1}</div>`).join('');
    }
</script>
</body>
</html>
