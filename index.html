<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapu Jagat Dashboard - Koh Alim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

<div class="dashboard">
    <header>
        <h1><i class="fa-solid fa-chart-line"></i> ANALISA SAPU JAGAT</h1>
        <div class="search-box">
            <input type="date" id="inputKalender" onchange="cariDataOtomatis()">
            <button onclick="cariDataOtomatis()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </header>
    <nav class="menu-bar">
    <a href="index.html" class="btn-menu btn-home active">HOME</a>
    <a href="history.html" class="btn-menu btn-history">HISTORY</a>
    </nav>
  <section style="max-width: 500px; margin: 20px auto; text-align: center;">
        <input type="text" id="inputScan" placeholder="Masukkan 4 angka..." maxlength="4" style="padding:10px; border-radius:10px; border:1px solid #ccc; width: 80%; margin-bottom: 10px;">
        
        <div style="margin-bottom: 10px; font-size: 0.9rem; cursor: pointer;">
            <input type="checkbox" id="checkPermute" style="cursor: pointer;"> 
            <label for="checkPermute" style="cursor: pointer;">Cari Bolak-Balik (Permutasi)</label>
        </div>

        <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
            <button onclick="scanAngka()" style="padding:10px 20px; cursor:pointer;">SCAN SEJARAH</button>
            <button onclick="scanTerakhir()" style="padding:10px 20px; cursor:pointer; background-color: #27ae60; color: white; border: none; border-radius: 5px;">CEK TERAKHIR</button>
        </div>

        <div id="hasilScan"></div>
    </section>
   <section class="latest-results">
        <h2 id="lastUpdateTitle" style="text-align: center; margin-bottom: 20px;">Result Terakhir: --/--/----</h2>
        
        <div class="result-grid">
            <div class="card warna-magnum">
                <div class="card-header">MAGNUM 4D</div>
                <div class="main-prizes">
                    <div><small>1st</small><div class="num p1" id="mag1">----</div></div>
                    <div><small>2nd</small><div class="num" id="mag2">----</div></div>
                    <div><small>3rd</small><div class="num" id="mag3">----</div></div>
                </div>
                <div class="extra-prizes">
                    <small>Special</small><div class="grid-small" id="magSpec"></div>
                    <small>Consolation</small><div class="grid-small" id="magCons"></div>
                </div>
            </div>

            <div class="card warna-kuda">
                <div class="card-header">DAMACAI 1+3D</div>
                <div class="main-prizes">
                    <div><small>1st</small><div class="num p1" id="kud1">----</div></div>
                    <div><small>2nd</small><div class="num" id="kud2">----</div></div>
                    <div><small>3rd</small><div class="num" id="kud3">----</div></div>
                </div>
                <div class="extra-prizes">
                    <small>Special</small><div class="grid-small" id="kudSpec"></div>
                    <small>Consolation</small><div class="grid-small" id="kudCons"></div>
                </div>
            </div>

            <div class="card warna-toto">
                <div class="card-header">SPORTS TOTO</div>
                <div class="main-prizes">
                    <div><small>1st</small><div class="num p1" id="tot1">----</div></div>
                    <div><small>2nd</small><div class="num" id="tot2">----</div></div>
                    <div><small>3rd</small><div class="num" id="tot3">----</div></div>
                </div>
                <div class="extra-prizes">
                    <small>Special</small><div class="grid-small" id="totSpec"></div>
                    <small>Consolation</small><div class="grid-small" id="totCons"></div>
                </div>
            </div>
            <div class="card warna-sgp">
                <div class="card-header">SINGAPORE</div>
                <div class="main-prizes">
                    <div><small>1st</small><div class="num p1" id="sgp1">----</div></div>
                    <div><small>2nd</small><div class="num" id="sgp2">----</div></div>
                    <div><small>3rd</small><div class="num" id="sgp3">----</div></div>
                </div>
                <div class="extra-prizes">
                    <small>Special</small><div class="grid-small" id="sgpSpec"></div>
                    <small>Consolation</small><div class="grid-small" id="sgpCons"></div>
                </div>
            </div>
        </div>
    </section>

<script>
    function cariDataOtomatis() {
        const tgl = document.getElementById('inputKalender').value;
        if (!tgl) return;
        // Panggil fungsi yang ada di script.js
        cariDiFile('data_keluaran_magnum.txt', 'mag', tgl);
        cariDiFile('data_keluaran_kuda.txt', 'kud', tgl);
        cariDiFile('data_keluaran_toto.txt', 'tot', tgl);
        cariDiFile('data_keluaran_sgp.txt', 'sgp', tgl);
    }
</script>
<script src="ambil_data.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        ambilDataLengkap('data_keluaran_magnum.txt', 'mag');
        ambilDataLengkap('data_keluaran_kuda.txt', 'kud');
        ambilDataLengkap('data_keluaran_toto.txt', 'tot');
        ambilDataLengkap('data_keluaran_sgp.txt', 'sgp');
    });
</script>
<link rel="stylesheet" href="hasil.css">
<script src="matching.js"></script>
<script src="matching2.js"></script>
</body>
</html>
