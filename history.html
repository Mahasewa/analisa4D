<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sapu Jagat Dashboard</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	
	<nav class="menu-bar">
    <a href="index.html" class="btn-menu btn-home">HOME</a>
    <button onclick="pilihPasaran('mag')" class="btn-menu">MAGNUM 4D</button>
    <button onclick="pilihPasaran('kud')" class="btn-menu">DAMACAI 1+3D</button>
    <button onclick="pilihPasaran('tot')" class="btn-menu">SPORTS TOTO</button>
	<button onclick="pilihPasaran('sgp')" class="btn-menu">SINGAPORE</button>
	</nav>
	<section style="max-width: 500px; margin: 20px auto; text-align: center;">
        <input type="text" id="inputScan" placeholder="Masukkan 4 angka..." maxlength="4" style="padding:10px; border-radius:10px; border:1px solid #ccc; width: 80%; margin-bottom: 10px;">
        
        <div style="margin-bottom: 10px; font-size: 0.9rem; cursor: pointer;">
            <input type="checkbox" id="checkPermute" style="cursor: pointer;"> 
            <label for="checkPermute" style="cursor: pointer;">Cari Bolak-Balik (Permutasi)</label>
        </div>

        <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
            <button onclick="scanAngka()" style="padding:10px 20px; cursor:pointer;">SCAN SEJARAH</button>
            <button onclick="scanTerakhir()" style="padding:10px 20px; cursor:pointer; background-color: #27ae60; color: white; border: none; border-radius: 5px;">CEK TERAKHIR</button>
        </div>

        <div id="hasilScan"></div>
    </section>
	<div id="kontenData" class="history-grid">
    </div>

	<div class="nav-btns">
   	 <button onclick="ubahHalaman(-1)">Previous</button>
  	  <span id="infoHal">Halaman 1</span>
  	  <button onclick="ubahHalaman(1)">Next</button>
	</div>

<script src="muat_data.js"></script>
<link rel="stylesheet" href="hasil.css">
<script src="matching.js"></script>
<script src="matching2.js"></script>
</body>
</html>
