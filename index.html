<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapu Jagat Dashboard - Koh Alim</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="dashboard">
    <header>
        <h1><i class="fa-solid fa-chart-line"></i> ANALISA SAPU JAGAT</h1>
        <div class="search-box">
            <input type="text" id="searchDate" placeholder="Cari tanggal (DD-MM-YYYY)...">
            <button onclick="cariData()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </header>

    <section class="latest-results">
        <h2 id="lastUpdateTitle">Result Terakhir: --/--/----</h2>
        <div class="result-grid">
            <div class="card magnum">
                <h3>MAGNUM</h3>
                <div class="number" id="resMagnum">----</div>
            </div>
            <div class="card kuda">
                <h3>KUDA</h3>
                <div class="number" id="resKuda">----</div>
            </div>
            <div class="card toto">
                <h3>TOTO</h3>
                <div class="number" id="resToto">----</div>
            </div>
        </div>
    </section>

    <section class="analysis-panel">
        <h3><i class="fa-solid fa-gears"></i> Generator Analisa BBFS</h3>
        <p>Pilih pasaran untuk melihat kombinasi angka yang menembus 4D hari ini:</p>
        
        <div class="market-selector">
            <label><input type="checkbox" id="checkMagnum" checked> Magnum</label>
            <label><input type="checkbox" id="checkKuda"> Kuda</label>
            <label><input type="checkbox" id="checkToto"> Toto</label>
        </div>

        <button class="btn-generator" onclick="jalankanGenerator()">
            <i class="fa-solid fa-bolt"></i> GENERATE ANALISA
        </button>

        <div id="analysisResult" class="analysis-output">
            </div>
    </section>
</div>

<script src="perintah.js"></script>
</body>
</html>
