<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sapu Jagat Dashboard</title>
    <style>

	<link rel="stylesheet" href="style.css">
    </style>
</head>
<body>

	<nav class="menu-bar">
   	 <button onclick="pilihPasaran('home')">HOME</button>
   	 <button onclick="pilihPasaran('mag')">MAGNUM 4D</button>
   	 <button onclick="pilihPasaran('kud')">DAMACAI 1+3D</button>
   	 <button onclick="pilihPasaran('tot')">SPORTS TOTO</button>
	</nav>

	<div id="kontenData" class="result-grid">Memuat data...</div>

	<div class="nav-btns">
   	 <button onclick="ubahHalaman(-1)">Previous</button>
  	  <span id="infoHal">Halaman 1</span>
  	  <button onclick="ubahHalaman(1)">Next</button>
	</div>
	<div class="card magnum">
                <div class="card-header">MAGNUM 4D</div>
                <div class="main-prizes">
                    <div><small>1st</small><div class="num p1" id="mag1">----</div></div>
                    <div><small>2nd</small><div class="num" id="mag2">----</div></div>
                    <div><small>3rd</small><div class="num" id="mag3">----</div></div>
                </div>
                <div class="extra-prizes">
                    <small>Special</small><div class="grid-small" id="magSpec"></div>
                    <small>Consolation</small><div class="grid-small" id="magCons"></div>
                </div>
            </div>
            <div class="card kuda">
                <div class="card-header">DAMACAI 1+3D</div>
                <div class="main-prizes">
                    <div><small>1st</small><div class="num p1" id="kud1">----</div></div>
                    <div><small>2nd</small><div class="num" id="kud2">----</div></div>
                    <div><small>3rd</small><div class="num" id="kud3">----</div></div>
                </div>
                <div class="extra-prizes">
                    <small>Special</small><div class="grid-small" id="kudSpec"></div>
                    <small>Consolation</small><div class="grid-small" id="kudCons"></div>
                </div>
            </div>
            <div class="card toto">
                <div class="card-header">SPORTS TOTO</div>
                <div class="main-prizes">
                    <div><small>1st</small><div class="num p1" id="tot1">----</div></div>
                    <div><small>2nd</small><div class="num" id="tot2">----</div></div>
                    <div><small>3rd</small><div class="num" id="tot3">----</div></div>
                </div>
                <div class="extra-prizes">
                    <small>Special</small><div class="grid-small" id="totSpec"></div>
                    <small>Consolation</small><div class="grid-small" id="totCons"></div>
                </div>
            </div>
        </div>
<script src="muat_data.js"></script>
</body>
</html>
